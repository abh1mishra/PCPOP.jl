# JuliaFormatter configuration for PCPOP.
# Run from an isolated environment (not a package dependency):
#   julia -e 'using JuliaFormatter; format(".")'
# Formats layout/whitespace only; it does not rename identifiers.

style = "default"
margin = 92
indent = 4
always_for_in = true
whitespace_ops_in_indices = true
whitespace_typedefs = true
remove_extra_newlines = true
trailing_comma = true
